<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escape the Forest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            position: fixed;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        #stamina-bar {
            width: 150px;
            height: 15px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        #stamina-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            width: 100%;
            transition: width 0.1s;
        }
        
        #danger-meter {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        #danger-bar {
            width: 150px;
            height: 15px;
            background: #333;
            border: 2px solid #ff4444;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        #danger-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            width: 0%;
            transition: width 0.1s;
        }
        
        #escape-text {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 16px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            animation: pulse 1s infinite;
            text-align: center;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #game-over, #victory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #ff0000;
            max-width: 90%;
        }
        
        #game-over h1, #victory h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        #game-over p, #victory p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        #victory {
            border-color: #00ff00;
        }
        
        #victory h1, #victory p {
            color: #00ff00;
        }
        
        button {
            padding: 12px 25px;
            font-size: 16px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        
        button:active {
            background: #ff0000;
            transform: scale(0.95);
        }
        
        #victory button {
            background: #00ff00;
            color: #000;
        }
        
        #victory button:active {
            background: #00dd00;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            z-index: 50;
            pointer-events: none;
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 12px;
            z-index: 100;
            text-align: center;
            max-width: 90%;
        }
        
        /* Touch Controls */
        #controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            z-index: 101;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px;
            gap: 10px;
        }
        
        .joystick-container {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        
        .joystick-dot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
        
        #sprint-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 100, 100, 0.6);
            border: 2px solid rgba(255, 100, 100, 0.9);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            touch-action: none;
        }
        
        #sprint-btn:active {
            background: rgba(255, 50, 50, 0.9);
            transform: scale(0.95);
        }
        
        #sprint-btn.depleted {
            background: rgba(100, 100, 100, 0.5);
            opacity: 0.5;
        }
        
        @media (max-height: 600px) {
            #controls {
                height: 120px;
            }
            
            .joystick-container {
                width: 100px;
                height: 100px;
            }
            
            .joystick-dot {
                width: 40px;
                height: 40px;
            }
            
            #sprint-btn {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="crosshair"></div>
    
    <div id="ui">
        <div>Stamina</div>
        <div id="stamina-bar">
            <div id="stamina-fill"></div>
        </div>
    </div>
    
    <div id="danger-meter">
        <div>Monster</div>
        <div id="danger-bar">
            <div id="danger-fill"></div>
        </div>
    </div>
    
    <div id="escape-text">🚪 REACH THE GATE 🚪</div>
    
    <div class="instructions">
        <strong>Use left joystick to move</strong><br>
        <strong>Use right joystick to look around</strong><br>
        <strong>Tap SPRINT button to run</strong>
    </div>
    
    <div id="controls">
        <div>
            <div class="joystick-container" id="moveJoystick">
                <div class="joystick-dot"></div>
            </div>
        </div>
        <button id="sprint-btn">SPRINT<br>(SPACE)</button>
        <div>
            <div class="joystick-container" id="lookJoystick">
                <div class="joystick-dot"></div>
            </div>
        </div>
    </div>
    
    <div id="game-over">
        <h1>☠️ CAUGHT ☠️</h1>
        <p>The monster got you...</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
    
    <div id="victory">
        <h1>✓ ESCAPED!</h1>
        <p>You made it out!</p>
        <button onclick="location.reload()">Play Again</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
